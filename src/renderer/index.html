<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepiri IDE</title>
  <style>
    #app-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1e1e1e; color: #ccc; font-family: system-ui, sans-serif; }
    #app-loading .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #0ea5e9; border-radius: 50%; animation: app-spin 0.8s linear infinite; margin-right: 12px; }
    @keyframes app-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-loading"><div class="spinner"></div><span>Loading Deepiri IDE…</span></div>
  </div>
  <script type="module" src="./main.jsx"></script>
</body>
</html>
